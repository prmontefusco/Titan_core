name: Qualidade

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Testes e análise estática
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    # Mesma imagem fixada do compose.yaml, de propósito: divergência entre o banco
    # do CI e o local reintroduziria a classe de falha que só aparece em um dos dois.
    # As credenciais abaixo são de banco descartável de CI, iguais às do ambiente
    # local público, e não são segredo.
    services:
      postgres:
        image: postgis/postgis:18-3.6@sha256:b410052c6f0d7d37b83cac1369df144e1c843971155dea3317961001704d0a9d
        env:
          POSTGRES_DB: titan
          POSTGRES_USER: titan
          POSTGRES_PASSWORD: titan_local_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U titan -d titan"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TITAN_DATABASE_URL: postgresql+psycopg://titan:titan_local_dev_password@127.0.0.1:5432/titan

    steps:
      - name: Obter código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configurar Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Configurar uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.30
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Verificar lockfile
        run: uv lock --check

      - name: Sincronizar ambiente
        run: uv sync --locked

      - name: Aplicar migrations
        run: uv run --locked alembic upgrade head

      - name: Executar testes e verificações arquiteturais
        run: uv run --locked pytest

      - name: Executar Ruff lint
        run: uv run --locked ruff check .

      - name: Verificar formatação Ruff
        run: uv run --locked ruff format --check .

      - name: Executar Mypy
        run: uv run --locked mypy

      - name: Verificar paridade do schema com as migrations
        run: uv run --locked alembic check
